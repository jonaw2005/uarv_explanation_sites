<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UARV Mission Planner</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="stylesheet" href="stylesheet.css" />
    <link rel="stylesheet" href="mission_planner.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
  </head>
  <body>
    <div class="planner-shell">
      <section class="planner-panel">
        <div class="planner-header">
          <img class="header-logo" src="logo.png" alt="UARV Logo" />
          <div>
            <h1>Mission Planner</h1>
            <p style="margin: 6px 0 0; color: #a8b2c7; font-size: 0.95rem;">
              Plan waypoints, edit missions, and send routes to the vehicle.
            </p>
          </div>
          <a href="index.html">Back to dashboard</a>
        </div>
        <div class="planner-body">
          <div class="planner-map">
            <div id="plannerMap"></div>
          </div>
          <div class="mission-sidebar">
            <div class="mission-block">
              <h2>Waypoint list</h2>
              <div class="mission-list" id="waypointList"></div>
            </div>
            <div class="mission-block">
              <h2>Mission order</h2>
              <div class="mission-list" id="missionList"></div>
            </div>
            <div class="mission-block mission-actions">
              <button id="addWaypointBtn">Add waypoint</button>
              <button id="addActionBtn">Add action</button>
              <button id="clearWaypointsBtn">Clear mission</button>
              <button id="uploadMissionBtn">Upload mission</button>
            </div>
            <div class="mission-block" id="coordinateForm" style="display:none;">
              <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px;">
                <h2 style="margin:0;">New waypoint</h2>
                <button id="cancelWaypointBtn" class="secondary-button" type="button">Cancel</button>
              </div>
              <label>
                Latitude
                <input type="number" id="inputLat" step="0.000001" placeholder="47.660000" />
              </label>
              <label>
                Longitude
                <input type="number" id="inputLon" step="0.000001" placeholder="9.480000" />
              </label>
              <button id="placeWaypointBtn">Place waypoint</button>
            </div>
            <div class="mission-block" id="actionForm" style="display:none;">
              <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px;">
                <h2 style="margin:0;">New action</h2>
                <button id="cancelActionBtn" class="secondary-button" type="button">Cancel</button>
              </div>
              <label>
                Action
                <select id="actionType">
                  <option value="takeoff">Takeoff</option>
                  <option value="loiter">Loiter</option>
                  <option value="rtl">Return to Launch</option>
                  <option value="land">Land</option>
                  <option value="delay">Delay</option>
                  <option value="set_speed">Set Speed</option>
                  <option value="condition_yaw">Condition Yaw</option>
                  <option value="land_start">Autoland Start</option>
                </select>
              </label>
              <label id="actionParamLabel">
                <span class="param-label">Altitude (m)</span>
                <input type="number" id="actionParam" step="1" placeholder="100" />
              </label>
              <button id="placeActionBtn">Place action</button>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    ></script>
    <script src="config.js"></script>
    <script src="mission_planner.js"></script>
  </body>
</html>
